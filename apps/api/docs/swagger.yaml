basePath: /
definitions:
  events.Event:
    properties:
      content:
        type: string
      id:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      occurred_at:
        type: string
      schema_version:
        type: string
      source:
        type: string
      source_id:
        type: string
      subject:
        type: string
      trace_id:
        type: string
      type:
        $ref: '#/definitions/events.Type'
    type: object
  events.Type:
    enum:
    - document.ingested
    - document.normalized
    - entity.extracted
    - identity.resolved
    - relationship.created
    - mismatch.detected
    - codex.analysis.completed
    type: string
    x-enum-varnames:
    - DocumentIngested
    - DocumentNormalized
    - EntityExtracted
    - IdentityResolved
    - RelationshipCreated
    - MismatchDetected
    - CodexAnalysisComplete
  request.GithubIngest:
    properties:
      provider:
        type: string
      token:
        type: string
      uri:
        type: string
    type: object
  request.SlackIngest:
    properties:
      provider:
        type: string
      token:
        type: string
      uri:
        type: string
    type: object
  response.GithubIngest:
    properties:
      capabilities:
        items:
          type: string
        type: array
      connector:
        type: string
      event:
        $ref: '#/definitions/events.Event'
      metadata:
        additionalProperties:
          type: string
        type: object
      preview:
        type: string
    type: object
  response.SlackIngest:
    properties:
      capabilities:
        items:
          type: string
        type: array
      connector:
        type: string
      event:
        $ref: '#/definitions/events.Event'
      metadata:
        additionalProperties:
          type: string
        type: object
      preview:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Local-first pipeline API for ingesting and reasoning over engineering
    context.
  title: ContextOS API
  version: "1.0"
paths:
  /github/ingest:
    post:
      consumes:
      - application/json
      description: Fetches a GitHub issue, PR, or commit by URI and returns a provenance-rich
        event.
      parameters:
      - description: GitHub ingest request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.GithubIngest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.GithubIngest'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest a GitHub artifact
      tags:
      - github
  /health:
    get:
      description: Returns ok when the API process is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Liveness check
      tags:
      - health
  /slack/callback:
    get:
      description: Receives the OAuth code from Slack, exchanges it for a token, and
        stores it locally.
      parameters:
      - description: Authorization code from Slack
        in: query
        name: code
        required: true
        type: string
      - description: CSRF state token
        in: query
        name: state
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: HTML confirmation page
          schema:
            type: string
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Slack OAuth callback
      tags:
      - slack
  /slack/connect:
    get:
      description: Generates a CSRF state token and redirects to Slack's OAuth consent
        page.
      produces:
      - text/html
      responses:
        "302":
          description: Redirect to Slack OAuth
          schema:
            type: string
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Initiate Slack OAuth
      tags:
      - slack
  /slack/ingest:
    post:
      consumes:
      - application/json
      description: Fetches messages from a Slack channel by URI and returns a provenance-rich
        event.
      parameters:
      - description: Slack ingest request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.SlackIngest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SlackIngest'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Ingest a Slack channel or message
      tags:
      - slack
  /slack/status:
    get:
      description: Returns token availability, source (env/oauth/none), workspace
        name, and OAuth readiness.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Slack connection status
      tags:
      - slack
swagger: "2.0"
