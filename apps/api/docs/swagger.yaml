basePath: /
definitions:
  artifacts.CleanupResult:
    properties:
      deleted_count:
        type: integer
      deleted_ids:
        items:
          type: string
        type: array
      matched_count:
        type: integer
      workspace_id:
        type: string
      workspace_path:
        type: string
    type: object
  codex.sourceCandidate:
    properties:
      connector:
        type: string
      id:
        type: string
      kind:
        type: string
      label:
        type: string
      uri:
        type: string
    type: object
  codex.sourceDiscoveryResponse:
    properties:
      connector:
        type: string
      provider:
        type: string
      sources:
        items:
          $ref: '#/definitions/codex.sourceCandidate'
        type: array
    type: object
  events.Event:
    properties:
      content:
        example: 'Issue body: Please update the connector README with setup steps.'
        type: string
      id:
        example: evt_a1b2c3d4e5f6
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      occurred_at:
        example: "2026-05-29T10:00:00Z"
        type: string
      schema_version:
        example: v1
        type: string
      source:
        example: github
        type: string
      source_id:
        example: https://github.com/owner/repo/issues/1
        type: string
      subject:
        example: 'Fix: update connector README'
        type: string
      trace_id:
        example: trace_a1b2c3d4e5f6
        type: string
      type:
        allOf:
        - $ref: '#/definitions/events.Type'
        example: document.ingested
    type: object
  events.Type:
    enum:
    - document.ingested
    - document.normalized
    - entity.extracted
    - identity.resolved
    - relationship.created
    - mismatch.detected
    - codex.analysis.completed
    type: string
    x-enum-varnames:
    - DocumentIngested
    - DocumentNormalized
    - EntityExtracted
    - IdentityResolved
    - RelationshipCreated
    - MismatchDetected
    - CodexAnalysisComplete
  repository.ConnectorSync:
    properties:
      connector:
        description: Connector is the source connector name.
        type: string
      cursor:
        description: Cursor is the replay checkpoint used for incremental sync.
        type: string
      eventCount:
        description: EventCount is the number of events ingested in the last sync
          run.
        type: integer
      lastError:
        description: LastError is the last error message, empty if no error.
        type: string
      lastSyncedAt:
        description: LastSyncedAt is when the last successful sync completed, nil
          if never.
        type: string
      sourceURI:
        description: SourceURI is the URI this sync record covers.
        type: string
      status:
        description: 'Status is the current sync state: connected | idle | syncing
          | error.'
        type: string
      workspaceID:
        description: WorkspaceID links the record to its workspace.
        type: string
    type: object
  repository.Workspace:
    properties:
      createdAt:
        description: CreatedAt is the UTC timestamp when the workspace was first registered.
        type: string
      id:
        description: ID is the primary key derived from the workspace path.
        type: string
      name:
        description: Name is the human-readable workspace name.
        type: string
      path:
        description: Path is the absolute local folder path used as the project key.
        type: string
      updatedAt:
        description: UpdatedAt is the UTC timestamp of the last write to the workspace
          row.
        type: string
    type: object
  request.ChatQuery:
    properties:
      connector:
        description: Connector optionally pins the query to a connector such as slack,
          github, jira, or filesystem.
        example: slack
        type: string
      limit:
        description: Limit caps returned artifacts.
        example: 20
        type: integer
      local_date:
        description: LocalDate is the user's current local date in YYYY-MM-DD form.
        example: "2026-06-01"
        type: string
      message:
        description: Message is the user question to answer from local ContextOS data.
        example: give me today's Slack messages
        type: string
      source_uri:
        description: SourceURI optionally pins the query to a channel, repository,
          folder, or document URI.
        example: '#delivery-team'
        type: string
      timezone:
        description: Timezone is the user's IANA timezone, used for local date words
          such as today.
        example: Asia/Kuala_Lumpur
        type: string
      workspace_id:
        description: WorkspaceID is the selected workspace path or stored workspace
          identifier.
        example: /home/user/myproject
        type: string
      workspace_path:
        description: WorkspacePath is an optional explicit workspace path; it takes
          precedence over WorkspaceID.
        example: /home/user/myproject
        type: string
    type: object
  request.FilesystemIngest:
    properties:
      content:
        example: Optional raw content instead of reading from URI
        type: string
      cursor:
        example: eyJsYXN0X2lkIjoiMTIzIn0=
        type: string
      exclude:
        example: node_modules,*.log
        type: string
      include:
        example: '*.go,*.md'
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      uri:
        example: storage/raw/README.md
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.GithubIngest:
    properties:
      provider:
        example: token
        type: string
      token:
        example: ghp_xxxx
        type: string
      uri:
        example: https://github.com/owner/repo/issues/1
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.GoogleDriveIngest:
    properties:
      access_token:
        example: ya29.a0AfH6SMD...
        type: string
      credential_path:
        example: /Users/name/.config/context-os/google-authorized-user.json
        type: string
      cursor:
        example: "2026-05-29T10:00:00Z"
        type: string
      folder_id:
        example: "1234567890"
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider:
        example: token
        type: string
      service_account_path:
        example: /Users/name/.config/context-os/google-service-account.json
        type: string
      uri:
        example: https://drive.google.com/drive/folders/1234567890
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.JiraIngest:
    properties:
      api_base_url:
        example: https://mysite.atlassian.net
        type: string
      content:
        example: Optional raw content override
        type: string
      cursor:
        example: eyJsYXN0X2lkIjoiMTIzIn0=
        type: string
      email:
        example: user@example.com
        type: string
      expand:
        example: renderedFields,names
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider:
        example: token
        type: string
      token:
        example: ATATT3xFfGF0xxxx
        type: string
      uri:
        example: https://site.atlassian.net/browse/PROJ-123
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.NotionIngest:
    properties:
      content:
        example: Optional raw content instead of fetching from Notion
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider:
        example: token
        type: string
      token:
        example: secret_xxxx
        type: string
      uri:
        example: notion://page/PAGE_ID
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.PresentationFindings:
    properties:
      connector:
        example: filesystem
        type: string
      content:
        example: frontend expects refundStatus but backend exposes missingRefundState
        type: string
      cursor:
        example: eyJsYXN0X2lkIjoiMTIzIn0=
        type: string
      force_refresh:
        description: ForceRefresh bypasses the findings cache and always re-ingests
          from source.
        type: boolean
      include_execution:
        type: boolean
      metadata:
        additionalProperties:
          type: string
        type: object
      provider:
        example: token
        type: string
      role:
        example: pmo
        type: string
      token:
        example: ghp_xxxx
        type: string
      uri:
        example: storage/raw/context.txt
        type: string
      workspace_id:
        description: |-
          WorkspaceID is the optional workspace path used to scope and persist results.
          When set the pipeline output is written to Postgres and cache-hit logic applies.
        example: /home/user/myproject
        type: string
    type: object
  request.SharePointIngest:
    properties:
      client_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      client_secret:
        example: secret~value
        type: string
      content:
        example: Optional raw content instead of fetching from Graph
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      provider:
        example: token
        type: string
      tenant_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      token:
        example: eyJ0...
        type: string
      uri:
        example: sharepoint://sites/mysite/items/abcdef01
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  request.SlackIngest:
    properties:
      provider:
        example: token
        type: string
      token:
        example: xoxb-111-222-xxxx
        type: string
      uri:
        example: slack://CHANNEL_ID
        type: string
      workspace_id:
        example: /home/user/myproject
        type: string
    type: object
  response.AnswerSection:
    properties:
      coding_notes:
        items:
          type: string
        type: array
      confidence:
        type: number
      connector:
        type: string
      facts:
        items:
          type: string
        type: array
      links:
        items:
          type: string
        type: array
      open_items:
        items:
          type: string
        type: array
      source_label:
        type: string
      source_uri:
        type: string
      status:
        type: string
      summary:
        type: string
      timestamps:
        items:
          type: string
        type: array
    type: object
  response.Artifact:
    properties:
      body:
        type: string
      connector:
        type: string
      content_hash:
        type: string
      event_type:
        type: string
      id:
        type: string
      ingested_at:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      preview:
        type: string
      schema_version:
        type: string
      source_uri:
        type: string
      title:
        type: string
      workspace_id:
        type: string
    type: object
  response.ArtifactList:
    properties:
      artifacts:
        items:
          $ref: '#/definitions/response.Artifact'
        type: array
      connector:
        type: string
      count:
        type: integer
      query:
        type: string
      source_uri:
        type: string
      workspace_id:
        type: string
      workspace_path:
        type: string
    type: object
  response.ChatQuery:
    properties:
      answer:
        type: string
      answer_sections:
        items:
          $ref: '#/definitions/response.AnswerSection'
        type: array
      artifact_count:
        type: integer
      artifacts:
        items:
          $ref: '#/definitions/response.Artifact'
        type: array
      connector:
        type: string
      evidence_event_count:
        description: EvidenceEventCount is the number of local events produced by
          the evidence save.
        type: integer
      evidence_graph_entity_count:
        description: EvidenceGraphEntityCount is the number of entities derived from
          newly saved live evidence.
        type: integer
      evidence_graph_relationship_count:
        description: EvidenceGraphRelationshipCount is the number of relationships
          derived from newly saved live evidence.
        type: integer
      evidence_graph_status:
        description: EvidenceGraphStatus describes whether saved live evidence updated
          the graph.
        type: string
      evidence_save_error:
        description: EvidenceSaveError is set when evidence persistence failed without
          discarding the live answer.
        type: string
      evidence_save_status:
        description: EvidenceSaveStatus describes whether a live Codex answer also
          persisted local evidence.
        type: string
      intent:
        type: string
      provider:
        type: string
      range_end:
        type: string
      range_start:
        type: string
      source_uri:
        type: string
      summary:
        type: string
      syncs:
        items:
          $ref: '#/definitions/repository.ConnectorSync'
        type: array
      workspace_id:
        type: string
      workspace_path:
        type: string
    type: object
  response.ExecutionEvidence:
    properties:
      assistive:
        type: boolean
      enabled:
        type: boolean
      error:
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      summary:
        type: string
    type: object
  response.Ingest:
    properties:
      capabilities:
        items:
          type: string
        type: array
      connector:
        example: github
        type: string
      entity_count:
        type: integer
      event:
        $ref: '#/definitions/events.Event'
      event_count:
        example: 1
        type: integer
      events:
        items:
          $ref: '#/definitions/events.Event'
        type: array
      metadata:
        additionalProperties:
          type: string
        type: object
      metadata_items:
        items:
          additionalProperties:
            type: string
          type: object
        type: array
      mismatch_count:
        type: integer
      persisted_event_count:
        type: integer
      persistence_mode:
        type: string
      preview:
        example: 'Issue #1: Fix connector README — requesting updated setup steps.'
        type: string
      previews:
        items:
          type: string
        type: array
      relationship_count:
        type: integer
      workspace_id:
        type: string
    type: object
  response.PMOSummary:
    properties:
      confidence:
        additionalProperties:
          type: number
        type: object
      evidence:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
      facts:
        items:
          type: string
        type: array
      impacts:
        items:
          type: string
        type: array
      recommended_decisions:
        items:
          type: string
        type: array
      risks:
        items:
          type: string
        type: array
    type: object
  response.PresentationFindings:
    properties:
      connector:
        type: string
      entity_count:
        type: integer
      event_count:
        type: integer
      execution:
        $ref: '#/definitions/response.ExecutionEvidence'
      mismatch_count:
        type: integer
      mismatch_ids:
        items:
          type: string
        type: array
      mismatches:
        items:
          $ref: '#/definitions/types.Mismatch'
        type: array
      pmo:
        $ref: '#/definitions/response.PMOSummary'
      relationship_count:
        type: integer
      role:
        type: string
      severity_count:
        additionalProperties:
          type: integer
        type: object
      summary:
        type: string
      trace_id:
        type: string
      uri:
        type: string
      views:
        $ref: '#/definitions/response.RoleViews'
    type: object
  response.RoleSummaryView:
    properties:
      finding_count:
        type: integer
      mismatch_ids:
        items:
          type: string
        type: array
      next_actions:
        items:
          type: string
        type: array
      role:
        type: string
      summary:
        type: string
    type: object
  response.RoleViews:
    properties:
      architecture:
        $ref: '#/definitions/response.RoleSummaryView'
      pmo:
        $ref: '#/definitions/response.RoleSummaryView'
      presentation_layer:
        $ref: '#/definitions/response.RoleSummaryView'
      qa:
        $ref: '#/definitions/response.RoleSummaryView'
      service_layer:
        $ref: '#/definitions/response.RoleSummaryView'
    type: object
  response.Workspace:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      path:
        type: string
      updated_at:
        type: string
    type: object
  response.WorkspaceStatus:
    properties:
      audit_count:
        type: integer
      connector_sync_count:
        type: integer
      entity_count:
        type: integer
      event_count:
        type: integer
      mismatch_count:
        type: integer
      relationship_count:
        type: integer
      syncs:
        items:
          $ref: '#/definitions/response.WorkspaceSync'
        type: array
      workspace:
        $ref: '#/definitions/response.Workspace'
      workspace_count:
        type: integer
    type: object
  response.WorkspaceSync:
    properties:
      connector:
        type: string
      cursor:
        type: string
      event_count:
        type: integer
      last_error:
        type: string
      last_synced_at:
        type: string
      source_uri:
        type: string
      status:
        type: string
      workspace_id:
        type: string
    type: object
  types.Mismatch:
    properties:
      affected_roles:
        description: delivery roles that need to act on this finding
        items:
          type: string
        type: array
      confidence:
        description: 0.0-1.0 score for how certain the reasoning stage is
        type: number
      entity_ids:
        description: IDs of the entities involved in the mismatch
        items:
          type: string
        type: array
      evidence:
        description: source artifact references supporting this finding
        items:
          type: string
        type: array
      id:
        description: unique identifier for this mismatch finding
        type: string
      impact:
        description: expected business or delivery impact level
        type: string
      recommended:
        description: suggested action for the team to resolve this
        type: string
      severity:
        description: 'impact level: low, medium, or high'
        type: string
      summary:
        description: human-readable description of what was found
        type: string
      type:
        description: stable category for the detection rule that produced this finding
        type: string
    type: object
  workspace.sourceRequest:
    properties:
      connector:
        description: Connector is the connector name, e.g. github or jira.
        type: string
      source_uri:
        description: SourceURI is the external source URI to save.
        type: string
      uri:
        description: URI is accepted for frontend compatibility with existing source
          forms.
        type: string
      workspace_id:
        description: WorkspaceID is a workspace path or ID.
        type: string
    type: object
  workspace.upsertRequest:
    properties:
      name:
        description: Name is the optional human-readable workspace name.
        type: string
      path:
        description: Path is the absolute local folder path for the workspace.
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Local-first pipeline API for ingesting and reasoning over engineering
    context.
  title: ContextOS API
  version: "1.0"
paths:
  /artifacts:
    get:
      description: Returns workspace-scoped source artifacts filtered by connector,
        source, time range, and text.
      parameters:
      - description: Workspace path or ID
        in: query
        name: workspace_id
        required: true
        type: string
      - description: Connector name
        in: query
        name: connector
        type: string
      - description: Source URI, channel, repository, or folder
        in: query
        name: source_uri
        type: string
      - description: Text search
        in: query
        name: q
        type: string
      - description: RFC3339 inclusive lower bound
        in: query
        name: since
        type: string
      - description: RFC3339 exclusive upper bound
        in: query
        name: until
        type: string
      - description: Maximum artifacts
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ArtifactList'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query local artifacts
      tags:
      - artifacts
  /artifacts/live-evidence/cleanup:
    post:
      description: Removes old noisy live_chat_answer artifacts for a workspace. This
        endpoint is explicit and never runs automatically.
      parameters:
      - description: Workspace path or ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/artifacts.CleanupResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Clean noisy live evidence
      tags:
      - artifacts
  /chat/query:
    post:
      consumes:
      - application/json
      description: Answers source, status, and findings-intent questions from local
        artifacts, with optional Codex live lookup for configured source-specific
        questions.
      parameters:
      - description: Chat query
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.ChatQuery'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.ChatQuery'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Query workspace context
      tags:
      - chat
  /chat/query/stream:
    post:
      consumes:
      - application/json
      description: Streams chat query progress, including live Codex logs, then emits
        the final chat result.
      parameters:
      - description: Chat query
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/request.ChatQuery'
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stream workspace context query
      tags:
      - chat
  /codex/login:
    post:
      description: Runs `codex login --device-auth` and streams log lines as SSE events.
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger Codex device login
      tags:
      - codex
  /codex/plugin-reauth:
    post:
      description: Removes then re-adds the named plugin to trigger a fresh OAuth
        flow.
      parameters:
      - description: 'Plugin short name: github, atlassian-rovo, jira, or slack'
        in: query
        name: plugin
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "405":
          description: Method Not Allowed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Re-authenticate a Codex plugin
      tags:
      - codex
  /codex/sources:
    get:
      description: Uses Codex plugins to list readable sources for github, jira, slack,
        notion, googledrive, or sharepoint.
      parameters:
      - description: 'Connector: github, jira, slack, notion, googledrive, or sharepoint'
        in: query
        name: connector
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/codex.sourceDiscoveryResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
