services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "contextos"
      POSTGRES_USER: "contextos"
      POSTGRES_PASSWORD: "contextos"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations/0001_enable_pgvector.sql:/docker-entrypoint-initdb.d/0001_enable_pgvector.sql:ro
      - ./migrations/0002_workspace_schema.sql:/docker-entrypoint-initdb.d/0002_workspace_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextos -d contextos"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      API_ADDR: ":8080"
      # Pass your local GITHUB_TOKEN into the container so the GitHub connector
      # can authenticate. Set it in your shell before running docker compose up:
      #   export GITHUB_TOKEN=ghp_...
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # Address of the AI worker used by the identity stage's opt-in WorkerMatcher
      # for semantic embedding. Uses the Docker service name on the shared network.
      WORKER_URL: "http://worker:8081"
      # Local-first infra wiring for upcoming persistence and queue integration.
      DATABASE_URL: "postgres://contextos:contextos@db:5432/contextos?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    ports:
      - "8081:8081"
    environment:
      WORKER_PORT: "8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      # Proxy targets use Docker service names instead of localhost
      API_URL: "http://api:8080"
      WORKER_URL: "http://worker:8081"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy

volumes:
  db_data:
