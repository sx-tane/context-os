services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      API_ADDR: ":8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    ports:
      - "8081:8081"
    environment:
      WORKER_PORT: "8081"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      # Proxy targets use Docker service names instead of localhost
      API_URL: "http://api:8080"
      WORKER_URL: "http://worker:8081"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
