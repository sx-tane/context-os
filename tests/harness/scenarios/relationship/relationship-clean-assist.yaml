id: relationship-clean-assist
area: relationship
level: benchmark
description: "A clean cross-layer artifact uses a fake assistant to recover an evidenced requirement-to-API edge."
owner: internal/pipeline

inputs:
  source_request:
    uri: "repo://example/relationship-clean-assist"
    content_path: "tests/harness/fixtures/relationship/relationship-clean-assist/input.txt"
    metadata_path: "tests/harness/fixtures/relationship/relationship-clean-assist/source-metadata.json"
  assistant:
    improves_recall: true
    proposals:
      - from: "Checkout fee rule"
        to: "checkoutFeeAmount"
        kind: "requirement_affects_api"
        evidence: "Checkout fee rule requires checkoutFeeAmount"
        confidence: 0.86

expected:
  golden_path: "tests/harness/golden/relationship/relationship-clean-assist.json"

thresholds:
  relationship_precision_min: 0.85
  relationship_recall_min: 0.70
  relationship_false_positive_rate_max: 0.15

evidence:
  - "tests/harness/fixtures/relationship/relationship-clean-assist/input.txt"
  - "tests/harness/fixtures/relationship/relationship-clean-assist/source-metadata.json"

notes: "Relationship quality benchmark for opt-in assistant edges; real Codex CLI is not used in tests."
